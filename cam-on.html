<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cảm ơn góp ý của bạn! | Heo Vàng</title>
<meta name="description" content="Cảm ơn bạn đã gửi góp ý cho Heo Vàng.">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://taichinhchocon.vn/cam-on/">
<meta name="theme-color" content="#F2A900">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#F2A900;--gold-deep:#C97F00;--gold-soft:#FFE7A8;--cream:#FFF8E7;--choco:#3B2A1A;--choco-soft:#6B5540;--coral:#FF6B5E;--coral-deep:#E04E41;--white:#FFF;--radius:22px;--shadow:0 10px 30px rgba(59,42,26,.10);--fd:'Baloo 2',system-ui,sans-serif;--fb:'Be Vietnam Pro',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);color:var(--choco);background:var(--cream);line-height:1.7;font-size:16.5px;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit}
.container{max-width:520px;margin:auto;padding:60px 20px;text-align:center}
h1{font-family:var(--fd);font-size:clamp(1.7rem,5vw,2.4rem);font-weight:800;margin:16px 0 12px}
.pig{font-size:4.5rem}
p{color:var(--choco-soft);font-size:1.05rem;margin-bottom:26px}
.btn{display:inline-block;font-family:var(--fd);font-weight:700;text-decoration:none;border-radius:999px;padding:12px 26px;background:var(--coral);color:var(--white);box-shadow:0 6px 0 var(--coral-deep);transition:transform .15s}
.btn:hover{transform:translateY(-2px)}
footer{background:var(--choco);color:#D8C6AE;padding:28px 0;text-align:center;font-size:.88rem}
footer a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<main class="container">
  <span class="pig">🐷💛</span>
  <h1>Cảm ơn góp ý của bạn!</h1>
  <p>Đội ngũ Heo Vàng đã nhận được tin nhắn và sẽ đọc kỹ. Nếu bạn để lại email, có thể sẽ nhận được phản hồi sớm.</p>
  <a class="btn" href="index.html">← Về trang chủ</a>
</main>
<footer>© 2026 Heo Vàng · <a href="index.html">taichinhchocon.vn</a></footer>
